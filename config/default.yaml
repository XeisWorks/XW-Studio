app:
  name: "XeisWorks Studio"
  theme: "light_blue"
  language: "de"
  window:
    width: 1600
    height: 1000
    remember_geometry: true
  sidebar:
    default_collapsed: false
    width_expanded: 220
    width_collapsed: 60

sevdesk:
  base_url: "https://my.sevdesk.de/api/v1"
  rate_limit:
    requests_per_second: 2
    cooldown_seconds: 5
  cache_ttl_seconds: 180
  http_max_retries: 3
  http_retry_backoff_seconds: 0.75

wix:
  base_url_v1: "https://www.wixapis.com/stores/v1"
  base_url_v3: "https://www.wixapis.com/stores/v3"

printing:
  music_dpi: 600
  invoice_dpi: 300
  buffer_quantity: 3
  rate_limit_seconds: 1
  invoice_printer: "Rechnungen"
  label_printer: "Brother QL-800"
  label_model: "QL-800"
  label_size: "62"
  label_template_path: "../sevDesk/XeisWorks - Versand_v2.lbx"
  # Printer names that are considered valid targets (Windows names, exact match).
  # Migrated from old sevDesk-project print_profiles + extra_printers.
  configured_printer_names:
    - "Rechnungen"
    - "Noten A4 Simplex"
    - "Noten A4 Duplex"
    - "Canon Broschüre Mono"
    - "Canon Broschüre Duo"
    - "Brother QL-800"
  # Named print profiles: map a logical role to a specific printer + DPI.
  # Use profile "id" when calling print_pdf() via product print rules.
  print_profiles:
    - id: "invoice"
      label: "Rechnungsdruck"
      printer_name: "Rechnungen"
      dpi: 300
    - id: "label"
      label: "Etikettendruck"
      printer_name: "Brother QL-800"
      dpi: 300
    - id: "noten_simplex"
      label: "Noten A4 Simplex"
      printer_name: "Noten A4 Simplex"
      dpi: 600
    - id: "noten_duplex"
      label: "Noten A4 Duplex"
      printer_name: "Noten A4 Duplex"
      dpi: 600
    - id: "brochure_mono"
      label: "Canon Broschüre Mono"
      printer_name: "Canon Broschüre Mono"
      dpi: 600
    - id: "brochure_duo"
      label: "Canon Broschüre Duo"
      printer_name: "Canon Broschüre Duo"
      dpi: 600

inventory:
  alarm_threshold: 5
  auto_sync_on_start: true

crm:
  fuzzy_match_threshold: 75
  duplicate_scan_on_sync: true

sku_rules:
  print_prefixes: ["XW-4", "XW-6", "XW-7"]
  unreleased_prefixes: ["XW-600"]
